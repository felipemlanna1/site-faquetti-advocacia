<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#d4b85c"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="navy-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="text-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#0a0f1e" flood-opacity="0.3"/>
    </filter>
    <filter id="gold-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Scales of justice icon -->
  <g transform="translate(10, 10)" filter="url(#gold-glow)">
    <!-- Center pillar -->
    <rect x="28" y="12" width="4" height="55" rx="2" fill="url(#gold-grad)"/>
    <!-- Base -->
    <rect x="15" y="64" width="30" height="4" rx="2" fill="url(#gold-grad)"/>
    <rect x="22" y="60" width="16" height="8" rx="2" fill="url(#gold-grad)"/>
    <!-- Top beam -->
    <rect x="5" y="10" width="50" height="3" rx="1.5" fill="url(#gold-grad)"/>
    <!-- Left scale plate -->
    <line x1="10" y1="13" x2="10" y2="30" stroke="#c9a84c" stroke-width="1.5"/>
    <path d="M2 30 Q6 38 10 30 Q14 38 18 30" fill="url(#gold-grad)" opacity="0.9"/>
    <!-- Right scale plate -->
    <line x1="50" y1="13" x2="50" y2="26" stroke="#c9a84c" stroke-width="1.5"/>
    <path d="M42 26 Q46 34 50 26 Q54 34 58 26" fill="url(#gold-grad)" opacity="0.9"/>
    <!-- Decorative circles on beam ends -->
    <circle cx="10" cy="12" r="3" fill="#c9a84c"/>
    <circle cx="50" cy="12" r="3" fill="#c9a84c"/>
    <circle cx="30" cy="11" r="4" fill="#d4b85c" stroke="#c9a84c" stroke-width="1"/>
  </g>

  <!-- Vertical divider -->
  <line x1="82" y1="20" x2="82" y2="80" stroke="url(#gold-grad)" stroke-width="1" opacity="0.4"/>

  <!-- Main text: FAQUETTI -->
  <text x="96" y="48" font-family="Georgia, 'DM Serif Display', serif" font-size="32" font-weight="400" fill="#c9a84c" letter-spacing="4" filter="url(#text-shadow)">FAQUETTI</text>

  <!-- Sub text: ADVOCACIA -->
  <text x="96" y="72" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14" fill="#94a3b8" letter-spacing="8" font-weight="500">ADVOCACIA</text>

  <!-- Decorative line under text -->
  <line x1="96" y1="80" x2="280" y2="80" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.5"/>

  <!-- Small tagline -->
  <text x="96" y="94" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" letter-spacing="2" font-style="italic">DESDE 2007 EM FLORIANOPOLIS</text>

  <!-- Decorative corner elements -->
  <path d="M92,22 L96,22 L96,18" fill="none" stroke="#c9a84c" stroke-width="0.7" opacity="0.5"/>
  <path d="M284,80 L288,80 L288,84" fill="none" stroke="#c9a84c" stroke-width="0.7" opacity="0.5"/>

  <!-- Small diamond ornament -->
  <polygon points="320,50 323,53 320,56 317,53" fill="#c9a84c" opacity="0.3"/>
  <polygon points="335,40 337,42 335,44 333,42" fill="#c9a84c" opacity="0.2"/>
  <polygon points="340,60 342,62 340,64 338,62" fill="#c9a84c" opacity="0.2"/>

  <!-- Additional decorative patterns for visual richness -->
  <g opacity="0.15">
    <!-- Greek key border pattern top -->
    <path d="M96,16 L100,16 L100,12 L104,12 L104,16 L108,16 L108,12 L112,12 L112,16 L116,16 L116,12 L120,12 L120,16 L124,16 L124,12 L128,12 L128,16 L132,16 L132,12 L136,12 L136,16 L140,16 L140,12 L144,12 L144,16 L148,16 L148,12 L152,12 L152,16 L156,16 L156,12 L160,12 L160,16 L164,16 L164,12 L168,12 L168,16 L172,16 L172,12 L176,12 L176,16 L180,16 L180,12 L184,12 L184,16 L188,16 L188,12 L192,12 L192,16 L196,16 L196,12 L200,12 L200,16 L204,16 L204,12 L208,12 L208,16 L212,16 L212,12 L216,12 L216,16 L220,16 L220,12 L224,12 L224,16 L228,16 L228,12 L232,12 L232,16 L236,16 L236,12 L240,12 L240,16 L244,16 L244,12 L248,12 L248,16 L252,16 L252,12 L256,12 L256,16 L260,16 L260,12 L264,12 L264,16 L268,16 L268,12 L272,12 L272,16 L276,16 L276,12 L280,12 L280,16" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
    <!-- Decorative laurel wreath hints on scales icon side -->
    <path d="M4,45 Q8,40 6,35 Q10,38 4,45Z" fill="#c9a84c"/>
    <path d="M4,50 Q8,55 6,60 Q10,57 4,50Z" fill="#c9a84c"/>
    <path d="M66,45 Q62,40 64,35 Q60,38 66,45Z" fill="#c9a84c"/>
    <path d="M66,50 Q62,55 64,60 Q60,57 66,50Z" fill="#c9a84c"/>
    <!-- Subtle horizontal lines background texture -->
    <line x1="96" y1="52" x2="280" y2="52" stroke="#c9a84c" stroke-width="0.3"/>
    <line x1="96" y1="54" x2="280" y2="54" stroke="#c9a84c" stroke-width="0.2"/>
    <line x1="96" y1="56" x2="280" y2="56" stroke="#c9a84c" stroke-width="0.15"/>
    <!-- Additional diamond pattern -->
    <polygon points="290,30 293,34 290,38 287,34" fill="#c9a84c"/>
    <polygon points="300,24 302,27 300,30 298,27" fill="#c9a84c"/>
    <polygon points="310,36 312,39 310,42 308,39" fill="#c9a84c"/>
    <polygon points="295,48 297,51 295,54 293,51" fill="#c9a84c"/>
    <polygon points="305,44 307,47 305,50 303,47" fill="#c9a84c"/>
    <polygon points="315,52 317,55 315,58 313,55" fill="#c9a84c"/>
    <polygon points="325,30 327,33 325,36 323,33" fill="#c9a84c"/>
    <polygon points="330,46 332,49 330,52 328,49" fill="#c9a84c"/>
    <polygon points="320,64 322,67 320,70 318,67" fill="#c9a84c"/>
    <polygon points="310,72 312,75 310,78 308,75" fill="#c9a84c"/>
    <polygon points="340,38 342,41 340,44 338,41" fill="#c9a84c"/>
    <polygon points="345,56 347,59 345,62 343,59" fill="#c9a84c"/>
  </g>
</svg>
